# Ashlr AO — Production Deployment
# Usage: ASHLR_DOMAIN=ashlr.yourdomain.com docker compose up -d

services:
  ashlr:
    build: .
    container_name: ashlr-ao
    restart: unless-stopped
    environment:
      - ASHLR_HOST=0.0.0.0
      - ASHLR_PORT=5111
      - XAI_API_KEY=${XAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ashlr_data:/root/.ashlr
    networks:
      - ashlr-net
    # Not exposed directly — Caddy handles public traffic

  caddy:
    image: caddy:2-alpine
    container_name: ashlr-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ASHLR_DOMAIN=${ASHLR_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ashlr-net
    depends_on:
      - ashlr

volumes:
  ashlr_data:
  caddy_data:
  caddy_config:

networks:
  ashlr-net:
